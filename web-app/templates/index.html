<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attention Monitor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>
<body
    data-monitoring="{{ 'true' if monitoring else 'false' }}"
    data-monitoring-since="{{ monitoring_since }}"
>
    <main>
        <form method="post" action="{{ url_for('stop_monitoring' if monitoring else 'start_monitoring') }}">
            <button
                id="toggle-button"
                type="submit"
                class="{{ 'stop' if monitoring else '' }}"
            >
                {{ 'Stop' if monitoring else 'Start' }}
            </button>
        </form>
    </main>

    <section id="popup-stack" aria-live="assertive" aria-atomic="false"></section>
    <video id="camera-preview" autoplay playsinline muted></video>

    <script src="{{ url_for('static', filename='js/index.js') }}"></script>
</body>
</html>
